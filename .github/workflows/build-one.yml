name: Build one OpenWrt target

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: Exact OpenWrt version
        required: true
        default: 24.10.7
        type: string
      target:
        description: OpenWrt target
        required: true
        default: mediatek
        type: string
      subtarget:
        description: OpenWrt subtarget
        required: true
        default: mt7622
        type: string
      publish_artifact:
        description: Upload build artifact
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-openwrt.yml
    with:
      openwrt_version: ${{ inputs.openwrt_version }}
      target: ${{ inputs.target }}
      subtarget: ${{ inputs.subtarget }}
      publish_artifact: ${{ inputs.publish_artifact }}
