name: Build one OpenWrt target

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: Exact OpenWrt version
        required: true
        default: 24.10.7
        type: string
      target:
        description: OpenWrt target
        required: true
        default: mediatek
        type: string
      subtarget:
        description: OpenWrt subtarget
        required: true
        default: mt7622
        type: string
      publish_artifact:
        description: Upload build artifact
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate supported exact combination
        env:
          VERSION: ${{ inputs.openwrt_version }}
          TARGET: ${{ inputs.target }}
          SUBTARGET: ${{ inputs.subtarget }}
        run: |
          test "$VERSION" = 24.10.7
          test "$TARGET" = mediatek
          test "$SUBTARGET" = mt7622
      - name: Build
        run: ./scripts/build-openwrt-24.10.7-ax6s.sh
      - uses: actions/upload-artifact@v4
        if: ${{ inputs.publish_artifact }}
        with:
          name: openwrt-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.subtarget }}
          path: dist/
          if-no-files-found: error
