name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format
        run: test -z "$(gofmt -l cmd internal)"
      - name: Unit and integration tests
        run: go test ./...
      - name: Race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Fuzz smoke
        run: go test ./internal/upstream -run '^$' -fuzz FuzzValidateResponse -fuzztime 10s

  static:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shell checks
        run: |
          shellcheck -s bash -e SC1091,SC2034,SC2153,SC2154 scripts/*.sh scripts/lib/*.sh \
            package/failsafe-dns-proxy/files/etc/init.d/failsafe-dns-proxy \
            package/failsafe-dns-proxy/files/usr/sbin/failsafe-dns-proxy-dnsmasq \
            package/failsafe-dns-proxy/files/usr/sbin/failsafe-dns-proxy-soak \
            package/luci-app-failsafe-dns-proxy/root/usr/libexec/rpcd/luci.failsafe-dns-proxy
      - name: LuCI JavaScript syntax
        run: node --check package/luci-app-failsafe-dns-proxy/htdocs/luci-static/resources/view/failsafe-dns-proxy/overview.js
      - name: Markdown lint
        run: npx --yes markdownlint-cli2@0.22.1
      - name: Workflow lint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.9
      - name: JSON syntax
        run: |
          python3 -m json.tool build/supported-openwrt.json >/dev/null
          python3 -m json.tool build/release-targets.json >/dev/null
          python3 -m json.tool package/luci-app-failsafe-dns-proxy/root/usr/share/luci/menu.d/luci-app-failsafe-dns-proxy.json >/dev/null
          python3 -m json.tool package/luci-app-failsafe-dns-proxy/root/usr/share/rpcd/acl.d/luci-app-failsafe-dns-proxy.json >/dev/null
      - name: Python syntax
        run: python3 -m compileall -q scripts
      - name: Release tooling tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Shell integration tests
        run: tests/shell/run.sh

  package-ipk:
    uses: ./.github/workflows/build-openwrt.yml
    with:
      openwrt_version: 24.10.7
      target: mediatek
      subtarget: mt7622

  package-apk:
    uses: ./.github/workflows/build-openwrt.yml
    with:
      openwrt_version: 25.12.4
      target: mediatek
      subtarget: mt7622
